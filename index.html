<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Registration Form</title>
<style>
    label{
        

    }
    h2{
        font-size: 20px;
        color:black ;
    }
    input{
        color: black;
    }
</style>
</head>
<body>

  <div class="form-box">
    <h2>Registration Form</h2>

    <form>
      <div>
      <label>Full Name:</label><br>
      <input type="text" placeholder="Enter your name" ><br><br>
      </div>
      <div>
      <label>Email:</label><br>
      <input type="email" placeholder="Enter your email" ><br><br>
      </div>
      <div>
      <label>Password:</label><br>
      <input type="password" placeholder="Enter password" ><br><br>
      </div>
      <div>
      <label>Gender</label>

      <div>
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Female</label>
      </div><br><br>
    </div>
      <div>
      <label>country</label><br>
      <select>
        <option>INDIA</option>
        <option>USA</option>
        <option>THAILAND</option>
      </select><br><br>
      </div>
       <div>
      <label>Phone</label><br>
      <input type="tel" placeholder="Enter phone number">
    </div><br><br>
    <div>
      <label>Website URL</label><br>
      <input type="url" placeholder="https://example.com">
    </div><br><br>
     <div>
      <label>Date</label><br>
      <input type="date">
    </div><br><br>
    <div>
      <label>Time</label><br>
      <input type="time">
    </div><br><br>

    <div>
      <label>Hobbies</label><br>

      <div>
        <label><input type="checkbox"> Cricket</label>
        <label><input type="checkbox"> Music</label>
        <label><input type="checkbox"> Coding</label>
      </div>
    </div><br><br>
     <div>
      <label>Message</label><br>

      <textarea rows="5" placeholder="Enter message"></textarea>
    </div><br><br>
    <div>
      <label>Range</label>
      <input type="range" min="0" max="100">
    </div><br><br>
      <div>
      <label>Color Picker</label>
      <input type="color">
    </div><br><br>
    <div>
      <label>File upload</label><br>
      <input type="file">
    </div><br><br>
    <div>
      <label>IMAGE</label>
      <input type="image">
    </div><br><br>
    <div>
      <label>search</label>
      <input type="search">
    </div><br><br>
    <div>
      <label>Hidden</label>
      <input type="hidden">
    </div><br><br>
    <div>
      <label>Month</label>
      <input type="month">
    </div><br><br>
    <div>
      <label>NUMBER</label>
      <input type="number">
    </div><br><br>
    <div>
      <label>datetime</label>
      <input type="datetime-local">
    </div><br><br>
    <div>
      <label>Read only</label>
      <input type="text" value="Krish" readonly >
    </div><br><br>
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </div>

</body>
</html>
