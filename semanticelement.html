<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Page Example</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;

        }
        header{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: skyblue;
            height: 50px;
        }
        a{
            padding-right: 25px;
            text-decoration: none;
            align-items: center;
            height: 60px;
        }
        main{
            height: 90vh;

        }
        footer{
            text-align: center;
            background-color: skyblue;
            color: black;
        }
    </style>
</head>
<body>

    <header>
        <nav>
                <a href="#home">Home</a>
                <a href="#articles">Articles</a>
                <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="articles">
            <h2>Latest html tags</h2><br><br>   

            <article>
                <h3>Semantic HTML</h3>
                <p>Semantic tags header,footer,main,section.aside.article</p>
            </article>
        </section><br><br>

        <aside>
            <h3>Trending Topics</h3>
            <ul>
                <li>Web Technology</li>
                <li>CSS Grid Layouts</li>
            </ul>
        </aside>
    </main>

    <footer>
        <p>&2026 silver oak. All rights reserved.</p>
    </footer>

</body>
</html>
